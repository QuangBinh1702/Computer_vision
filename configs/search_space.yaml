trials: 20
seed: 42
search:
  lr:
    type: float
    low: 0.00003
    high: 0.001
    log: true
  weight_decay:
    type: float
    low: 0.00001
    high: 0.001
    log: true
  batch_size:
    type: categorical
    values: [16, 32, 64]
  model_name:
    type: categorical
    values: [resnet50, efficientnet_b3, convnext_tiny, swin_t]
  label_smoothing:
    type: categorical
    values: [0.0, 0.05, 0.1]
  aug_strength:
    type: categorical
    values: [light, medium, strong]
selection_criteria:
  primary: valid_top1
  secondary: valid_top5
  stability_metric: last_3_epoch_std
